<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Teman Ibadah - Cek Hotel</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="aksara-logo.JPG">
    <link rel="shortcut icon" href="aksara-logo.JPG">

    <!-- Mobile Browser -->
    <link rel="apple-touch-icon" href="aksara-logo.JPG">

    <!-- Theme Color -->
    <meta name="theme-color" content="#2C2A28">
</head>

<body>

<section class="hero">

    <div class="overlay">

        <img src="aksara-logo.JPG" class="logo">

        <h1>Cek Ketersediaan Hotel</h1>

        <p>
            Isi formulir berikut untuk mengecek ketersediaan hotel
            selama perjalanan ibadah Anda.
        </p>

    </div>

</section>


<section class="booking">

<div class="card">

<h2>Reservation Hotel</h2>

<div class="form-group">

<label>Nama Hotel</label>

<select id="hotel">

<option>Al Marwa Rayhaan</option>
<option>Anjum Hotel</option>
<option>Swissotel Makkah</option>
<option>Pullman Zamzam</option>
<option>Hilton Suites</option>
<option>Movenpick Hajar Tower</option>

</select>

</div>


<div class="row">

<div class="form-group">

<label>Check In</label>

<input type="date" id="checkin">

</div>

<div class="form-group">

<label>Check Out</label>

<input type="date" id="checkout">

</div>

</div>


<div class="row">

<div class="form-group">

<label>Jumlah Room</label>

<input type="number" id="room" value="1" min="1">

</div>

<div class="form-group">

<label>Request Hotel Lain</label>

<input
type="text"
id="request"
placeholder="Opsional">

</div>

</div>

<button onclick="sendWA()">

Cek Ketersediaan

</button>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
